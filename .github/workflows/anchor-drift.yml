# SPDX-License-Identifier: MPL-2.0
name: Anchor Drift

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Weekly proactive run so member-pin drift surfaces even with no push.
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  membership-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check membership manifest and submodule declarations
        run: scripts/check-membership.sh
      - name: Resolve submodule pins
        run: |
          # Full (non-shallow) fetch so recorded gitlink pins that are not a
          # branch tip are retrievable; resolve one level (this hub's members).
          git submodule sync
          git submodule update --init
          git submodule status
      - name: Report pin drift vs member main (advisory)
        continue-on-error: true
        run: |
          # Early-warning, non-failing: flag any member pinned BEHIND its main
          # tip — the precursor state to a pin becoming unreachable (the
          # "not our ref" failure the resolve step above hits only once a pin
          # is fully orphaned). Every member declares branch=main, so the
          # member's main tip is the correct comparison point.
          git submodule foreach --quiet '
            pinned="$(git rev-parse --short=10 HEAD)"
            git fetch -q origin main 2>/dev/null || true
            tip="$(git rev-parse --short=10 FETCH_HEAD 2>/dev/null || echo "")"
            if [ -n "$tip" ] && [ "$pinned" != "$tip" ]; then
              echo "::warning title=submodule pin drift::$sm_path pinned $pinned, member main is $tip — re-pin before it is orphaned"
            fi
          '

  upstream-pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check upstream spec and governance pins
        run: |
          anchor=".machine_readable/anchors/ANCHOR.a2ml"
          test -f "$anchor" || { echo "missing $anchor"; exit 1; }
          grep -q '\[upstream.spec\]' "$anchor" || { echo "missing [upstream.spec]"; exit 1; }
          grep -q '\[upstream.governance\]' "$anchor" || { echo "missing [upstream.governance]"; exit 1; }
          pins="$(grep -E '^[[:space:]]*pin[[:space:]]*=' "$anchor" || true)"
          echo "upstream pins:"
          echo "$pins"
          if echo "$pins" | grep -q 'TODO-tag'; then
            echo "::notice::upstream pin is still TODO-tag — advisory only until the first standards tag is cut"
          fi

  governance-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hyperpolymath/a2ml-validate-action@main
        with:
          path: "."
          strict: "true"
          paths-ignore: |
            vendor/
            vendored/
            verified-container-spec/
            .audittraining/
            integration/fixtures/
            test/fixtures/
            tests/fixtures/
            members/
            conformance/
