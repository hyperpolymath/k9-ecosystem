name: Anchor Drift

on:
  push:
    branches:
      - main
      - claude/gracious-goodall-4vnq77
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  membership-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check membership manifest and submodule declarations
        run: scripts/check-membership.sh
      - name: Resolve submodule pins
        run: |
          # Full (non-shallow) fetch so recorded gitlink pins that are not a
          # branch tip are retrievable; resolve one level (this hub's members).
          git submodule sync
          git submodule update --init
          git submodule status

  upstream-pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check upstream spec and governance pins
        run: |
          anchor=".machine_readable/anchors/ANCHOR.a2ml"
          test -f "$anchor" || { echo "missing $anchor"; exit 1; }
          grep -q '\[upstream.spec\]' "$anchor" || { echo "missing [upstream.spec]"; exit 1; }
          grep -q '\[upstream.governance\]' "$anchor" || { echo "missing [upstream.governance]"; exit 1; }
          pins="$(grep -E '^[[:space:]]*pin[[:space:]]*=' "$anchor" || true)"
          echo "upstream pins:"
          echo "$pins"
          if echo "$pins" | grep -q 'TODO-tag'; then
            echo "::notice::upstream pin is still TODO-tag — advisory only until the first standards tag is cut"
          fi

  governance-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hyperpolymath/a2ml-validate-action@main
        with:
          path: "."
          strict: "true"
          paths-ignore: |
            vendor/
            vendored/
            verified-container-spec/
            .audittraining/
            integration/fixtures/
            test/fixtures/
            tests/fixtures/
            members/
            conformance/
